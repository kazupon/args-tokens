name: Release

# Triggers:
#   - tag push (v*): normal release flow runs npm/jsr publish in parallel,
#     then release-notes on success of both.
#   - workflow_dispatch: fallback recovery. Pick which job to run for an
#     existing tag (npm-publish / jsr-publish / release-notes / all).
on:
  push:
    branches-ignore:
      - '**'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      job:
        description: Which job to run
        type: choice
        required: true
        default: all
        options:
          - all
          - npm-publish
          - jsr-publish
          - release-notes
      tag:
        description: Existing tag to release (e.g. v1.2.3)
        type: string
        required: true

env:
  TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

permissions: {}

jobs:
  npm-publish:
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
        (inputs.job == 'all' || inputs.job == 'npm-publish'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm OIDC trusted publisher

    steps:
      - name: Checkout codes
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.TAG }}
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish to npm
        # OIDC trusted publisher: requires id-token: write, no NPM_TOKEN needed.
        # Provenance is automatically attached via OIDC.
        run: pnpm publish --access public --no-git-checks --tag latest

  jsr-publish:
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
        (inputs.job == 'all' || inputs.job == 'jsr-publish'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # JSR OIDC

    steps:
      - name: Checkout codes
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.TAG }}
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish to JSR
        run: pnpm exec jsr publish --config jsr.json

  release-notes:
    needs:
      - npm-publish
      - jsr-publish
    if: >-
      always() && (
        (github.event_name == 'push' &&
          needs.npm-publish.result == 'success' &&
          needs.jsr-publish.result == 'success') ||
        (github.event_name == 'workflow_dispatch' && inputs.job == 'release-notes') ||
        (github.event_name == 'workflow_dispatch' && inputs.job == 'all' &&
          needs.npm-publish.result == 'success' &&
          needs.jsr-publish.result == 'success')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write # GitHub Release creation + CHANGELOG push

    steps:
      - name: Checkout codes
        # zizmor: ignore[artipacked] -- git-auto-commit-action needs persisted credentials to push.
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - name: Create GitHub Release
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping creation"
          else
            gh release create "$TAG" --generate-notes
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync changelog from GitHub Releases
        run: npx gh-changelogen --repo=kazupon/args-tokens --tag="$TAG"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit changelog
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # v7.2.0
        with:
          branch: main
          file_pattern: CHANGELOG.md
          commit_message: 'chore: generate changelog'
